name: cost_tracker
description: Cost tracking helper app with image OCR extraction.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  path: ^1.9.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  permission_handler: ^11.4.0
  image: ^4.2.0
  google_mlkit_text_recognition: ^0.13.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  http: ^1.2.2
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  receive_sharing_intent: ^1.8.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/fire_dark.png
  adaptive_icon_background: "#111827"
  adaptive_icon_foreground: assets/fire_dark.png

flutter:
  uses-material-design: true
  assets:
    - assets/
